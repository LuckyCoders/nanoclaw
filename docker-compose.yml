services:
  nanoclaw:
    build: .
    image: nanoclaw:latest
    container_name: nanoclaw
    restart: unless-stopped
    env_file: .env
    environment:
      HOME: /app
      CREDENTIAL_PROXY_HOST: 0.0.0.0
      # Host path for agent mounts (paths from nanoclaw container don't resolve on host)
      NANOCLAW_HOST_PROJECT_ROOT: ${PWD:-.}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./store:/app/store
      - ./groups:/app/groups
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/.config/nanoclaw
    ports:
      - "3001:3001"
